name: Lab 4 Helm Quality Gate

on:
  push:
    branches:
      - main
      - lab4
  pull_request:
    branches:
      - main
      - lab4

jobs:
  helm-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind

      - name: Wait for nodes
        run: kubectl wait --for=condition=ready node --all --timeout=120s

      - name: Run Helm Grading Script
        run: |
          chmod +x ./tests/lab4_test.sh
          ./tests/lab4_test.sh