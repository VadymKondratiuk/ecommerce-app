name: Lab 2 CI/CD Pipeline

on: 
  push: 
    branches: [ "main" ]

env: 
  REGISTRY: ghcr.io
  PACKAGE_NAME: ecommerce-app

jobs: 
  build-and-push: 
    runs-on: ubuntu-latest
    
    permissions: 
      contents: read
      packages: write
    
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Convert owner to lowercase
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
    
      - name: Log in to the Container registry 
        uses: docker/login-action@v3
        with: 
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with: 
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.PACKAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.PACKAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.PACKAGE_NAME }}:latest
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      
      - name: Run Master Validation Script
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./tests/lab2_test.sh
          ./tests/lab2_test.sh