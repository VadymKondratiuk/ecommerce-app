name: Lab3 Kubernetes Quality Gate

on:
  push:
    branches:
      - lab3
      - main
  pull_request:
    branches:
      - lab3
      - main

jobs:
  k8s-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind

      - name: Check cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Wait for nodes
        run: kubectl wait --for=condition=ready node --all --timeout=120s

      - name: Build Docker image
        run: |
          docker build -t ecommerce-app:local .

      - name: Load image into KinD
        run: |
          kind load docker-image ecommerce-app:local --name kind

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ecommerce-app --timeout=240s

      - name: Run Grading Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh
