name: Lab3 Kubernetes Quality Gate

on:
  push:
    branches:
      - lab3
  pull_request:
    branches:
      - lab3

jobs:
  k8s-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0

      - name: Check cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Wait for nodes to be ready
        run: kubectl wait --for=condition=ready node --all --timeout=120s

      - name: Wait for system pods
        run: kubectl wait --for=condition=ready pod -n kube-system --all --timeout=180s

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/

      - name: Wait for app rollout
        run: |
          kubectl rollout status deployment/ecommerce-app --timeout=180s

      - name: Wait for pods to be ready
        run: |
          kubectl get pods -A
          kubectl wait --for=condition=ready pod -l app=ecommerce-app --timeout=120s

      - name: Run Grading Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh
